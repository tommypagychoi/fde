apiVersion: apps/v1
kind: Deployment
metadata:
  name: fde-frontend
  namespace: fde-system
spec:
  replicas: 1
  selector:
    matchLabels:
      app: fde-frontend
  template:
    metadata:
      labels:
        app: fde-frontend
    spec:
      containers:
        - name: frontend
          image: ghcr.io/tommypagychoi/fde/frontend:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 80
          volumeMounts:
            - name: nginx-config
              mountPath: /etc/nginx/conf.d/default.conf
              subPath: default.conf
      volumes:
        - name: nginx-config
          configMap:
            name: fde-frontend-nginx
---
apiVersion: v1
kind: Service
metadata:
  name: fde-frontend
  namespace: fde-system
spec:
  type: NodePort
  selector:
    app: fde-frontend
  ports:
    - name: http
      port: 80
      targetPort: 80
      nodePort: 30081
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: fde-frontend-nginx
  namespace: fde-system
data:
  default.conf: |
    server {
        listen 80;
        server_name _;

        root /usr/share/nginx/html;
        index index.html;

        location / {
            try_files $uri /index.html;
        }

        location /api/ {
            proxy_pass http://fde-backend:8000/api/;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        location /health {
            proxy_pass http://fde-backend:8000/health;
        }
    }
