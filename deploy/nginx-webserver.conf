server {
    listen 80 default_server;
    server_name 192.168.0.86;

    root /var/www/fde;
    index index.html;

    location / {
        try_files $uri /index.html;
    }

    location /api/ {
        proxy_pass http://192.168.0.85:30080/api/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /health {
        proxy_pass http://192.168.0.85:30080/health;
    }

    location = /grafana {
        return 302 /grafana/;
    }

    location /grafana/ {
        return 302 http://192.168.0.81:32000/;
    }

    location = /prometheus {
        return 302 http://192.168.0.85:32001/;
    }
}
